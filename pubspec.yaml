name: locallens
description: Offline document translation with layout preservation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  file_picker: ^8.0.3
  syncfusion_flutter_pdf: ^27.1.48
  syncfusion_flutter_pdfviewer: ^27.1.48
  google_mlkit_text_recognition: ^0.13.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  http: ^1.2.1
  image: ^4.1.7
  image_gallery_saver: ^1.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
