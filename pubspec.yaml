name: locallens
description: Offline document translation with layout preservation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_svg: ^2.0.10+1

  # Dosya seçici
  file_picker: ^8.0.3

  # PDF işleme
  syncfusion_flutter_pdf: ^26.2.14
  syncfusion_flutter_pdfviewer: ^26.2.14

  # OCR (ML Kit - on-device)
  google_mlkit_text_recognition: ^0.13.0

  # Yerel depolama
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2

  # İzin yönetimi
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
